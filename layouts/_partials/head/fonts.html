{{- /* Self-hosted Inter + JetBrains Mono (latin + cyrillic subsets, weights
       400/500/600/700). @font-face src points at fingerprinted files, so the
       rules are generated here (one justified inline <style>). Latin and
       cyrillic ship as separate files with unicode-range, so latin-only pages
       never fetch the cyrillic subset. Two text faces are preloaded. If the
       font files are absent the block emits nothing and the system fallbacks in
       --font-sans/--font-mono take over. */ -}}
{{- $latin := "U+0000-00FF, U+0131, U+0152-0153, U+2000-206F, U+2212" -}}
{{- $cyr := "U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116" -}}
{{- $weights := slice 400 500 600 700 -}}
{{- $fams := slice
      (dict "family" "Inter" "slug" "inter")
      (dict "family" "JetBrains Mono" "slug" "jbm") -}}
{{- $subs := slice (dict "name" "latin" "range" $latin) (dict "name" "cyrillic" "range" $cyr) -}}
{{- $faces := "" -}}
{{- range $fam := $fams -}}
  {{- range $sub := $subs -}}
    {{- range $w := $weights -}}
      {{- $path := printf "fonts/%s-%s-%d.woff2" $fam.slug $sub.name $w -}}
      {{- with resources.Get $path -}}
        {{- $f := cond hugo.IsProduction (. | fingerprint "sha256") . -}}
        {{- $faces = printf "%s@font-face{font-family:'%s';font-style:normal;font-weight:%d;font-display:swap;src:url('%s') format('woff2');unicode-range:%s}" $faces $fam.family $w $f.RelPermalink $sub.range -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if $faces -}}
  {{- /* preload the two most-used text faces (latin regular) */ -}}
  {{- range slice "fonts/inter-latin-400.woff2" "fonts/jbm-latin-400.woff2" -}}
    {{- with resources.Get . -}}
      {{- $f := cond hugo.IsProduction (. | fingerprint "sha256") . }}
  <link rel="preload" as="font" type="font/woff2" href="{{ $f.RelPermalink }}" crossorigin>
    {{- end -}}
  {{- end }}
  <style>{{ $faces | safeCSS }}</style>
{{- end -}}
