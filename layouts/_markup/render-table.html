{{- /* Wrap every markdown table in <div class="tbl-wrap"> (the mock's scroll box),
       reproducing Hugo's default table output inside. */ -}}
<div class="tbl-wrap">
  <table{{ range $k, $v := .Attributes }} {{ $k }}="{{ $v }}"{{ end }}>
    <thead>
      {{- range .THead }}
      <tr>
        {{- range . }}
        <th{{ with .Alignment }} style="text-align: {{ . }}"{{ end }}>{{ .Text }}</th>
        {{- end }}
      </tr>
      {{- end }}
    </thead>
    <tbody>
      {{- range .TBody }}
      <tr>
        {{- range . }}
        <td{{ with .Alignment }} style="text-align: {{ . }}"{{ end }}>{{ .Text }}</td>
        {{- end }}
      </tr>
      {{- end }}
    </tbody>
  </table>
</div>
