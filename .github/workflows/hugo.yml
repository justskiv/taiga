name: CI

# Smoke-builds the bundled exampleSite against the theme in place, builds the
# search index, and checks links. The theme itself is the repo root; the demo is
# built with `--themesDir`, exactly as documented in the README.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin the Hugo version. Non-extended is enough — this is a plain-CSS theme
  # (esbuild for css.Build/js.Build and image processing for OG covers both ship
  # in the ordinary binary). Bump as you validate newer releases.
  HUGO_VERSION: "0.154.5"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check the repo out INTO a folder named after the theme ("taiga"), so that
      # `--themesDir ../..` resolves `theme = "taiga"` to this very repo — the same
      # trick the local `taiga` symlink plays before the repo folder is renamed.
      - uses: actions/checkout@v4
        with:
          path: taiga
          submodules: recursive
          fetch-depth: 0            # full history → .GitInfo / lastmod

      - name: Install Hugo ${{ env.HUGO_VERSION }}
        run: |
          curl -sSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "$HOME/.local/bin"
          tar -xzf /tmp/hugo.tar.gz -C "$HOME/.local/bin" hugo
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Pagefind
        run: pip install "pagefind[bin]==1.5.2"

      - name: Smoke-build exampleSite (warnings are fatal)
        working-directory: taiga
        run: |
          hugo -s exampleSite --themesDir ../.. --gc --minify \
            --panicOnWarning --printPathWarnings --printI18nWarnings

      - name: Build the search index
        working-directory: taiga
        run: python3 -m pagefind --site exampleSite/public

      - name: Check internal links
        working-directory: taiga
        run: python3 scripts/check-links.py exampleSite/public

  # ---------------------------------------------------------------------------
  # Optional: deploy the demo (exampleSite) to GitHub Pages.
  #
  # To enable: in the repo settings set Pages → Source → "GitHub Actions", then
  # uncomment the block below and add `pages: write` and `id-token: write` to the
  # top-level `permissions:`. Set the demo's baseURL to the Pages URL at build
  # time (`--baseURL "${{ steps.pages.outputs.base_url }}/"`). The artifact is
  # `taiga/exampleSite/public` (built by the `build` job above; add an
  # upload-pages-artifact step there, or rebuild here).
  #
  # deploy:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: github-pages
  #     url: ${{ steps.deployment.outputs.page_url }}
  #   steps:
  #     - id: deployment
  #       uses: actions/deploy-pages@v4
