name: CI

# Smoke-builds the bundled exampleSite against the theme in place, builds the
# search index, checks links — and, on main, publishes that same build as the
# theme's demo site. The theme itself is the repo root; the demo is built with
# `--themesDir`, exactly as documented in the README.
#
# The demo IS the `demosite` declared in theme.toml, so this workflow is what
# makes that URL real: themes.gohugo.io no longer hosts theme demos, it just
# links out to one.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin the Hugo version. Non-extended is enough — this is a plain-CSS theme
  # (esbuild for css.Build/js.Build and image processing for OG covers both ship
  # in the ordinary binary). Bump as you validate newer releases.
  HUGO_VERSION: "0.154.5"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check the repo out INTO a folder named after the theme ("taiga"), so that
      # `--themesDir ../..` resolves `theme = "taiga"` to this very repo — the same
      # trick the local `taiga` symlink plays before the repo folder is renamed.
      - uses: actions/checkout@v4
        with:
          path: taiga
          submodules: recursive
          fetch-depth: 0            # full history → .GitInfo / lastmod

      - name: Install Hugo ${{ env.HUGO_VERSION }}
        run: |
          curl -sSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "$HOME/.local/bin"
          tar -xzf /tmp/hugo.tar.gz -C "$HOME/.local/bin" hugo
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Pagefind
        run: pip install "pagefind[bin]==1.5.2"

      # No --baseURL here on purpose: exampleSite/hugo.toml already points at the
      # Pages subpath, so the build that CI checks is byte-for-byte the build that
      # ships. A theme that only works at a domain root is a theme with a bug, and
      # this is where that bug would surface.
      - name: Smoke-build exampleSite (warnings are fatal)
        working-directory: taiga
        run: |
          hugo -s exampleSite --themesDir ../.. --gc --minify \
            --panicOnWarning --printPathWarnings --printI18nWarnings

      - name: Build the search index
        working-directory: taiga
        run: python3 -m pagefind --site exampleSite/public

      # --base-path must match the subpath in exampleSite/hugo.toml's baseURL.
      # Without it every asset URL looks broken (public/ IS the subpath root), and
      # worse, a link that genuinely escapes the subpath would hide in the noise.
      - name: Check internal links
        working-directory: taiga
        run: python3 scripts/check-links.py exampleSite/public --base-path /taiga

      # The README and docs/ are never seen by `hugo` — nothing else checks them,
      # and a dead link in the README is the first thing a visitor meets.
      - name: Check README and docs links
        working-directory: taiga
        run: python3 scripts/check-docs.py .

      # Only needed for the deploy job below, and only from main.
      - name: Upload the demo as a Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: taiga/exampleSite/public

  # Publishes the demo to https://justskiv.github.io/taiga/.
  #
  # REQUIRES a one-time repo setting: Settings → Pages → Source → "GitHub Actions".
  # Until that is switched on, this job fails (it cannot create the Pages site for
  # you). The build job above is unaffected either way.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
