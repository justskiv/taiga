# surface / text ramp — the DEEP neutral, companion to Graphite (#262626).
# Intentionally near-black for readers who want it darker; text is softened off
# near-white (#cfcfcf, not #e0e0e0) so the deep canvas reads ~12:1 rather than
# a glary 16-17:1 (cf. Obsidian Minimal's opt-in "dark-black": #bfbfbf on black).
# Body is painted on --bg-deep, so bg-deep IS the reading canvas.
"bg-deep" = "#141414"
"bg-base" = "#1a1a1a"
"bg-surface" = "#1f1f1f"
"bg-raised" = "#2a2a2a"
"bg-hover" = "#242424"
"border" = "#303030"
"text-primary" = "#cfcfcf"
"text-secondary" = "#a0a0a0"
"text-muted" = "#8a8a8a"
"text-ghost" = "#656565"
"text-strong" = "#e0e0e0"
"gtok-str" = "#cbb279"

# brand accents (constant across built-in palettes; overridable)
"accent" = "#55c0b7"
