name = { en = "Light ☀", ru = "Белая ☀" }
weight = 70
light = true

# surface / text ramp (swapped per theme)
"bg-deep" = "#f6f8fa"
"bg-base" = "#ffffff"
"bg-surface" = "#ffffff"
"bg-raised" = "#eaeef2"
"bg-hover" = "#eff2f5"
"border" = "#d1d9e0"
"text-primary" = "#1f2328"
"text-secondary" = "#59636e"
"text-muted" = "#66707c"
"text-ghost" = "#949ca6"
"text-strong" = "#0b0d10"
"gtok-str" = "#9a6700"
"body-glow" = "none"

# brand accents (overridable)
# DELIBERATELY DARKER THAN THE OTHER PALETTES — do not "restore" it to #55c0b7.
# Same brand hue (glacier teal), deeper shade. --accent is not only link text: it
# is also the CTA *background*, and the label on it is --bg-deep (14-home.css:
# `.btn-cta{color:var(--bg-deep); background:var(--accent)}`). Here --bg-deep is
# near-WHITE (#f6f8fa), so the accent must be dark enough to carry white text,
# while on the dark palettes it must be light enough to carry near-black text.
# Those requirements are disjoint: the light palette needs relative luminance
# <= .169, the dark ones need >= .390. No single hex satisfies both — hence the
# per-palette shade. #0e7a71 gives 4.89:1 on the CTA and 5.21:1 for links on
# white; the amber it replaced scored 2.41:1 and 2.57:1 (both failing).
"accent" = "#0e7a71"
"accent-dim" = "rgba(14,122,113,.18)"
"accent-glow" = "rgba(14,122,113,.28)"
"accent-green" = "#a8c954"
"accent-green-dim" = "rgba(168,201,84,.16)"
"accent-green-glow" = "rgba(168,201,84,.22)"
"accent-copper" = "#c87a42"
"accent-copper-dim" = "rgba(200,122,66,.18)"
"accent-blue" = "#6ba4c9"
"accent-blue-dim" = "rgba(107,164,201,.16)"
"accent-gold" = "#d4a24e"
"accent-gold-dim" = "rgba(212,162,78,.18)"
