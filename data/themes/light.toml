name = { en = "Light ☀", ru = "Белая ☀" }
weight = 70
light = true

# surface / text ramp (swapped per theme)
"bg-deep" = "#f6f8fa"
"bg-base" = "#ffffff"
"bg-surface" = "#ffffff"
"bg-raised" = "#eaeef2"
"bg-hover" = "#eff2f5"
"border" = "#d1d9e0"
"text-primary" = "#1f2328"
"text-secondary" = "#59636e"
"text-muted" = "#66707c"
"text-ghost" = "#949ca6"
"text-strong" = "#0b0d10"
"gtok-str" = "#9a6700"
"body-glow" = "none"

# brand accents (overridable)
# DELIBERATELY DARK — keep the site's amber brand identity here, but a DARK shade.
# --accent is not only link text: it is also the CTA *background*, and the label
# on it is --bg-deep (14-home.css: `.btn-cta{color:var(--bg-deep); background:var(--accent)}`).
# Here --bg-deep is near-WHITE (#f6f8fa), so the accent must be dark enough to
# carry near-white text AND to read as a link on near-white. A bright brand
# orange fails both directions: #ea8a2e scores 2.41:1 (fail). This dark orange
# holds the amber identity while passing: #b45309 gives 4.72:1 for links on the
# canvas and 4.72:1 on the CTA (5.02:1 on pure white). It is the same hue as the
# dark-palette brand accent (#ea8a2e, hue ~28deg), only darkened.
# NB: the global brand-accent override (params.accent) is SKIPPED for light
# palettes in head/palettes.html, so this value actually reaches the page —
# without that skip the bright #ea8a2e returns and re-breaks contrast (2.41:1).
"accent" = "#b45309"   # was #0e7a71 (teal); now dark brand-orange
"accent-dim" = "rgba(180,83,9,.18)"
"accent-glow" = "rgba(180,83,9,.28)"
"accent-green" = "#a8c954"
"accent-green-dim" = "rgba(168,201,84,.16)"
"accent-green-glow" = "rgba(168,201,84,.22)"
"accent-copper" = "#c87a42"
"accent-copper-dim" = "rgba(200,122,66,.18)"
"accent-blue" = "#6ba4c9"
"accent-blue-dim" = "rgba(107,164,201,.16)"
"accent-gold" = "#d4a24e"
"accent-gold-dim" = "rgba(212,162,78,.18)"
"accent-red" = "#b5503f"
"accent-red-dim" = "rgba(181,80,63,.12)"
# Violet is the one brand accent that also needs darkening here: #a48bd4 is a
# pastel that dissolves on near-white. This shade keeps the hue and reads as
# text on the canvas.
"accent-violet" = "#7a5fb8"
"accent-violet-dim" = "rgba(122,95,184,.14)"
