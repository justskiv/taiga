# ── strings that live in JS ──────────────────────────────────────────────────
# Everything below is shipped to the browser by the js-bridge partial as
# window.THEME_I18N; modules/i18n.js merges it over its English defaults. The
# `js_` prefix marks exactly which keys leave the server.

# theme / view popover
[js_theme_head]
other = "Тема"
[js_popover_aria]
other = "Тема и вид"
[js_pin_panel]
other = "закрепить панель"
[js_key_or]
other = "или"

# focus mode
[js_focus_exit_tip]
other = "Выйти из фокуса"
[js_focus_title]
other = "Фокус: только текст (F)"
[js_focus_aria]
other = "Фокус: скрыть панели и шапку (F)"

# ⌘K search modal
[js_search_aria]
other = "Поиск по гайдам"
[js_search_placeholder]
other = "искать гайд, серию, тему…"
[js_search_empty]
other = "Ничего не нашлось. Попробуй «gc», «слайс», «планировщик»…"
[js_search_unbuilt]
other = "Индекс поиска ещё не собран. Соберётся командой pagefind --site public."

# scroll-to-top button
[js_scrolltop]
other = "Наверх"

# tags page (/tags/) filter
[js_tag_feed_head]
other = "лента"
[js_tag_reset]
other = "сбросить"
[js_tag_empty_tail]
other = " — такого тега нет. Проверь ссылку или выбери тему из облака выше."
# bare plural word for the filter's "N гайдов" line: the count is only known in
# the browser, so Hugo renders one word per probe count and Intl.PluralRules
# picks the matching one (see modules/i18n.js plural()).
[js_guides_word]
one = "гайд"
few = "гайда"
many = "гайдов"
other = "гайда"

# term shortcode: the definition card's footer link and its no-JS appendix.
# term_more is the default text of the optional "read more" link (per-term
