# OG cover style "dots" (a dot grid). Text blocks drawn over base.png in
# order via images.Text. Placeholders {title} {kicker} {meta} {domain} {part}
# are filled by og-image.html (i18n-aware). Unknown keys are ignored, so the
# format is forward-compatible. Fonts resolve in this folder first, then og/fonts/.
name = "Dots"

# kicker — mono, the brand accent, upper-cased. "accent" is resolved by
# og-image.html at build time (params.accent, else the default palette's accent)
# and baked in: the dots plate is neutral, so the kicker follows whatever brand
# the site runs. The native glacier teal reads 8.3:1 on base.png.
[[block]]
text = "{kicker}"
font = "JetBrainsMono-SemiBold.ttf"
size = 27
color = "accent"
x = 76
y = 224
upper = true

# title — big Inter, tight leading. It wraps at the IMAGE edge; images.Text has
# no width/wrap option, so the measure is the plate, not a number here.
[[block]]
text = "{title}"
font = "Inter-ExtraBold.ttf"
size = 66
color = "#e6dfd2"
x = 76
y = 270
lineheight = 1.13

# bottom-left: the wordmark
[[block]]
text = "{domain}"
font = "JetBrainsMono-Medium.ttf"
size = 24
color = "#7d786e"
x = 76
y = 545

# bottom-right: "~N min · goX.Y" (right edge at x, mono only)
[[block]]
text = "{meta}"
font = "JetBrainsMono-Medium.ttf"
size = 24
color = "#7d786e"
x = 1124
y = 545
align = "right"
