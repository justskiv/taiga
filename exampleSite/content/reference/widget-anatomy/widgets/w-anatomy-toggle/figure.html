  fallback, next to the inline-body form used elsewhere on this demo site
  (e.g. playground/index.md's {{< widget id="w-reflex" >}}…{{< /widget >}}).
  Both forms end up in the same "w-root" mount; this one just keeps the
  markup out of the prose and colocated with widget.js/widget.css instead.
-->
